# ─────────────────────────────────────────────────────────────────────────────
# Recurrsive Full Stack — Docker Compose
#
# Services:
#   postgres   — Apache AGE graph database (PostgreSQL + Cypher)
#   server     — Recurrsive REST + WebSocket API
#   dashboard  — Recurrsive Dashboard (Next.js)
#   website    — Recurrsive Marketing Website (Next.js)
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#   docker compose -f docker/docker-compose.yml down -v
#
# For managed platforms (EasyPanel, Coolify), use easypanel.json instead.
# Managed platforms handle reverse proxy and port mapping automatically —
# the `ports` below are only needed for local development.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL + Apache AGE ────────────────────────────────────────────────
  postgres:
    image: apache/age:release_PG16_1.5.0
    environment:
      POSTGRES_USER: recurrsive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: recurrsive
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recurrsive -d recurrsive"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Recurrsive API Server ──────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://recurrsive:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/recurrsive
      GRAPH_PROVIDER: postgresql_age
      PORT: "3000"
      NODE_ENV: production
      # LLM configuration (optional — set in .env or override)
      RECURRSIVE_LLM_PROVIDER: ${RECURRSIVE_LLM_PROVIDER:-openai}
      RECURRSIVE_LLM_MODEL: ${RECURRSIVE_LLM_MODEL:-gpt-4.1-mini}
      RECURRSIVE_LLM_API_KEY: ${RECURRSIVE_LLM_API_KEY:-}
      # Webhook configuration
      RECURRSIVE_WEBHOOK_SECRET: ${RECURRSIVE_WEBHOOK_SECRET:-}
      RECURRSIVE_WEBHOOK_TIMEOUT_MS: ${RECURRSIVE_WEBHOOK_TIMEOUT_MS:-5000}
      RECURRSIVE_WEBHOOK_MAX_RETRIES: ${RECURRSIVE_WEBHOOK_MAX_RETRIES:-3}
      # Auth configuration
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to at least 32 random characters}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:?SECRETS_ENCRYPTION_KEY must be a different random value of at least 32 characters}
      ALLOW_DEMO_USERS: "false"
      TRUST_PROXY: "true"
      RECURRSIVE_ALLOWED_GIT_HOSTS: ${RECURRSIVE_ALLOWED_GIT_HOSTS:-github.com,gitlab.com,bitbucket.org}
      # CORS — allow dashboard and website origins
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must list the production dashboard and website origins}
      # Tier configuration
      ENABLE_ENTERPRISE: ${ENABLE_ENTERPRISE:-true}
      ENABLE_ECOSYSTEM: ${ENABLE_ECOSYSTEM:-true}
    ports:
      - "3000:3000"
    volumes:
      - server-data:/app/data
    tmpfs:
      - /tmp:size=1g,mode=1777
    restart: unless-stopped

  # ── Recurrsive Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_URL: http://server:3000
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: http://server:3000
      INTERNAL_API_URL: http://server:3000
      PUBLIC_API_URL: http://localhost:3000
      PORT: "3100"
      NODE_ENV: production
    ports:
      - "3100:3100"
    restart: unless-stopped

  # ── Recurrsive Marketing Website ───────────────────────────────────────────
  website:
    build:
      context: ..
      dockerfile: docker/Dockerfile.website
    environment:
      INTERNAL_API_URL: http://server:3000
      PORT: "3200"
      NODE_ENV: production
    ports:
      - "3200:3200"
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  server-data:
    driver: local
