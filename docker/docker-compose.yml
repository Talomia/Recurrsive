# ─────────────────────────────────────────────────────────────────────────────
# Recurrsive Full Stack — Docker Compose
#
# Services:
#   postgres   — Apache AGE graph database (PostgreSQL + Cypher)
#   server     — Recurrsive REST + WebSocket API
#   dashboard  — Recurrsive Dashboard (Next.js)
#   website    — Recurrsive Marketing Website (Next.js)
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#   docker compose -f docker/docker-compose.yml down -v
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL + Apache AGE ────────────────────────────────────────────────
  postgres:
    image: apache/age:latest
    environment:
      POSTGRES_USER: recurrsive
      POSTGRES_PASSWORD: recurrsive
      POSTGRES_DB: recurrsive
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Recurrsive API Server ──────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://recurrsive:recurrsive@postgres:5432/recurrsive
      GRAPH_PROVIDER: postgresql_age
      PORT: "3000"
      NODE_ENV: production
      # LLM configuration (optional — set in .env or override)
      RECURRSIVE_LLM_PROVIDER: ${RECURRSIVE_LLM_PROVIDER:-openai}
      RECURRSIVE_LLM_MODEL: ${RECURRSIVE_LLM_MODEL:-gpt-4.1-mini}
      RECURRSIVE_LLM_API_KEY: ${RECURRSIVE_LLM_API_KEY:-}
      # Webhook configuration
      RECURRSIVE_WEBHOOK_SECRET: ${RECURRSIVE_WEBHOOK_SECRET:-}
      RECURRSIVE_WEBHOOK_TIMEOUT_MS: ${RECURRSIVE_WEBHOOK_TIMEOUT_MS:-5000}
      RECURRSIVE_WEBHOOK_MAX_RETRIES: ${RECURRSIVE_WEBHOOK_MAX_RETRIES:-3}
    expose:
      - "3000"
    volumes:
      - server-data:/app/data
    restart: unless-stopped

  # ── Recurrsive Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: http://server:3000
      PORT: "3100"
      NODE_ENV: production
    expose:
      - "3100"
    restart: unless-stopped

  # ── Recurrsive Marketing Website ───────────────────────────────────────────
  website:
    build:
      context: ..
      dockerfile: docker/Dockerfile.website
    environment:
      PORT: "3200"
      NODE_ENV: production
    expose:
      - "3200"
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  server-data:
    driver: local
