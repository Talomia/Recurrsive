# Recurrsive — AI/ML Project Configuration
# Extended config for projects using LLM APIs and AI agents

version: "1"

project:
  name: ai-powered-app
  repository: https://github.com/org/ai-app

# Knowledge graph
graph:
  provider: sqlite

# Analyzer configuration.
# All 12 built-in analyzers run by default (including ai.quality, ai.runtime,
# and cost.optimization). Use `recurrsive analyze --analyzers <id,id>` to run
# a subset.
analyzers:
  enabled: ["*"]
  disabled: []
  # Per-analyzer config overrides (reserved — not yet applied by the CLI)
  config: {}

# LLM configuration for reasoning engine
reasoning:
  provider: openai
  model: gpt-4.1-mini
  # api_key: set OPENAI_API_KEY or RECURRSIVE_LLM_API_KEY env var
  max_debate_rounds: 3
  temperature: 0.3

# Data governance — extra careful with AI data
governance:
  pii_detection: true
  masked_fields:
    - password
    - secret
    - token
    - api_key
    - openai_key
    - anthropic_key
    - embedding
    - vector
  excluded_patterns:
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/.git/**"
    - "**/model_weights/**"
    - "**/checkpoints/**"
    - "**/*.onnx"
    - "**/*.pt"
    - "**/*.safetensors"

# Policies — paths to custom policy definition files.
# The built-in policy sets (security baseline, change management, cost
# governance, compliance, quality gates) are always active.
policies: []
  # - ./policies/ai-governance.json

# Output settings
output:
  format: json
  directory: .recurrsive
