# Recurrsive — Enterprise Configuration
# Full-featured config for enterprise environments with governance

version: "1"

project:
  name: enterprise-platform
  repository: https://github.com/enterprise/platform

# Knowledge graph — PostgreSQL with Apache AGE for production
graph:
  provider: postgresql_age
  connection_string: postgres://recurrsive:password@localhost:5432/recurrsive_graph

# Selective analyzers for enterprise focus areas.
# NOTE: analyzer selection via config is not yet wired into the CLI — all 12
# built-in analyzers run by default. To run a subset today, use:
#   recurrsive analyze --analyzers architecture.structural,security.vulnerabilities
analyzers:
  enabled:
    - architecture.structural
    - security.vulnerabilities
    - reliability.resilience
    - performance.general
    - cost.optimization
    - data.schema-quality
  disabled: []
  # Per-analyzer config overrides (reserved — not yet applied by the CLI)
  config: {}

# LLM configuration (enterprise proxy)
reasoning:
  provider: openai
  model: gpt-4o
  max_debate_rounds: 5
  temperature: 0.2

# Strict data governance
governance:
  pii_detection: true
  audit_log: true
  retention_days: 365
  masked_fields:
    - password
    - secret
    - token
    - api_key
    - ssn
    - social_security
    - credit_card
    - phone_number
    - email
    - date_of_birth
    - address
  excluded_patterns:
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/.git/**"
    - "**/vendor/**"
    - "**/third_party/**"
    - "**/*.min.js"
    - "**/coverage/**"
    - "**/test-fixtures/**"

# Enterprise policies — paths to custom policy definition files.
# The built-in policy sets (security baseline, change management, cost
# governance, compliance, quality gates) are always active.
policies: []
  # - ./policies/enterprise-security.json
  # - ./policies/change-approval.json

# Output — SARIF for GitHub Advanced Security integration
output:
  format: sarif
  directory: .recurrsive
