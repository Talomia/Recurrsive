packages:
  - 'packages/*'
  - 'apps/*'

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  tree-sitter: true
  tree-sitter-javascript: true
  tree-sitter-python: true
  tree-sitter-typescript: true
  unrs-resolver: true

overrides:
  postcss: '>=8.5.10'

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp
  - tree-sitter
  - tree-sitter-javascript
  - tree-sitter-python
  - tree-sitter-typescript
  - unrs-resolver
